name: Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  workflow_call:
    # Reusable callers must pass PR context explicitly because `github.event.pull_request`
    # is not populated for `workflow_call` runs.
    inputs:
      pr_number:
        description: Pull request number to review when called as a reusable workflow.
        required: true
        type: number
      is_draft:
        description: Whether the pull request is still a draft when called as a reusable workflow.
        required: false
        default: false
        type: boolean
      head_repo_full_name:
        description: Head repository full name for same-repo validation. Required so the same-repo check fails closed when callers forget to pass it.
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  # `actions: read` keeps Actions metadata readable for the running job.
  actions: read
  # `contents: read` is required for checkout and for Claude to inspect repository files.
  contents: read
  # `id-token: write` is required because `claude-code-action` requests an OIDC token internally.
  id-token: write
  # `pull-requests: write` is required to post inline review
  # comments, and resolve review threads via GraphQL.
  pull-requests: write

concurrency:
  # Use the PR number when available so repeated reviews for the same PR cancel older runs
  # whether this workflow is triggered directly or via `workflow_call`.
  group: claude-review-${{ github.repository }}-${{ github.event_name }}-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request &&
        !github.event.pull_request.draft &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        inputs.pr_number &&
        !inputs.is_draft &&
        inputs.head_repo_full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Resolve the PR number once for both direct PR-triggered runs and reusable workflow callers.
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Keep enough history for `git log` and `git blame` without cloning everything.
          fetch-depth: 100

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Force the action onto the job-scoped GITHUB_TOKEN (contents: read,
          # pull-requests: write) instead of its default write-capable GitHub App
          # token, so a prompt-injected PR can't reach write endpoints via Bash(gh api).
          github_token: ${{ github.token }}
          prompt: |
            ## Handle Previous Review Comments

            Before starting your review, check for and resolve your own previous comments:

            1. Get all previous top-level inline review comments authored by THIS workflow — `github-actions[bot]` comments that carry the `<!-- claude-code-review -->` marker (this excludes replies and other tools that share the `github-actions[bot]` token):
               `gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/comments --paginate --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- claude-code-review -->")) and .in_reply_to_id == null)]'`
            2. Get the current diff: `gh pr diff ${{ env.PR_NUMBER }}`
            3. For each previous comment:
               - Read the CURRENT version of the file at the commented line
               - If FIXED: reply "Fixed. {brief description}" and resolve the thread
               - If STILL EXISTS: leave the thread untouched — do NOT reply again and do NOT create a duplicate inline comment (avoid re-notifying on every synchronize)
               - If PARTIALLY FIXED: reply explaining what remains
            4. Only create NEW inline comments for genuinely new issues not already covered.
            5. To resolve fixed comment threads:
               a. Query review thread IDs via GraphQL (paginated, all comments per thread):
                  `gh api graphql --paginate -f query='query($endCursor:String){ repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { pullRequest(number:${{ env.PR_NUMBER }}) { reviewThreads(first:100, after:$endCursor) { pageInfo { hasNextPage endCursor } nodes { id isResolved comments(first:100) { nodes { databaseId body } } } } } } }'`
               b. Match each fixed comment's databaseId to find the thread node ID
               c. Resolve: `gh api graphql -f query='mutation { resolveReviewThread(input:{threadId:"THREAD_NODE_ID"}) { thread { isResolved } } }'`

            ## Review Instructions

            Review this pull request for code quality, correctness, and security.
            Analyze the diff in the context of the full codebase.
            Only report actionable findings that are specific and important.
            Use these severity levels in each finding: P1 for blocking or high-risk issues, P2 for meaningful issues.
            Do not report minor issues (what would otherwise be P3) — skip them entirely rather than downgrading or reframing them as P2.
            Skip generated files, lockfiles, vendored code, and style-only nits unless they hide a real bug.
            Keep the review concise: at most 10 findings total.
            Post findings as inline review comments on the specific lines where issues are found.
            End every inline review comment you post with the hidden marker `<!-- claude-code-review -->` (invisible in rendered Markdown) so later runs can reliably tell your own comments apart from other `github-actions[bot]` automation.
            Follow the guidelines in REVIEW.md if present.
          # Keep the tool surface narrow: inline comments, read-only PR/git inspection,
          # plus `gh api` / `gh pr comment` for resolving previous review threads.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 300
            --allowedTools "Read,Glob,Grep,WebSearch,WebFetch,mcp__github_inline_comment__create_inline_comment,Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(git log:*),Bash(git blame:*)"
        env:
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
